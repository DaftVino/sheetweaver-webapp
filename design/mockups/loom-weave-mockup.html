<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loom C — Weave Animation Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* ===== Token layer (copied from Index.html — subset needed for this mockup) ===== */
  :root {
    --bg-page: #0b3542;
    --bg-glow: rgba(45, 200, 185, 0.18);
    --bg-card: #ffffff;
    --text-main: #253044;
    --text-muted: #647084;
    --primary: #0d7070;
    --border: #d7dde6;
    --shadow: rgba(13, 112, 112, 0.12);
    --shadow-md: 0 2px 4px var(--shadow);
    --radius-md: 8px;
    --radius-lg: 12px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-8: 32px;
    --font-sm: 13px;
    --font-base: 16px;
    --font-2xl: 24px;

    /* Loom A tokens (spec: issues/loom-a-foundation-tokens.md) */
    --thread: #2dd4bf;
    --duration-fast: 120ms;
    --duration-base: 180ms;

    /* Mockup-only: dot grid values (Solar) */
    --dot-color: rgba(255,255,255,0.055);
  }
  body.theme-torres {
    --bg-page: #0f172a;
    --bg-glow: rgba(45, 212, 191, 0.12);
    --bg-card: #212b3d;
    --text-main: #f3f3f3;
    --text-muted: #c7cfdd;
    --primary: #38c4b4;
    --border: #40506a;
    --shadow: rgba(0, 0, 0, 0.38);
    --thread: #5eead4;
  }
  body.theme-nes {
    --bg-page: #2f3e57;
    --bg-glow: rgba(185, 67, 47, 0.15);
    --bg-card: #d8d5c8;
    --text-main: #2f302d;
    --text-muted: #625d55;
    --primary: #7b5a3a;
    --border: #9a8f7f;
    --shadow: rgba(47, 40, 32, 0.24);
    --radius-md: 0;
    --radius-lg: 2px;
    --thread: #b9432f;
  }

  /* ===== Page frame (mirrors Index.html body) ===== */
  body {
    font-family: 'Inter', system-ui, Arial, sans-serif;
    font-size: var(--font-base);
    line-height: 1.5;
    margin: 0;
    padding: var(--space-5);
    min-height: 100vh;
    box-sizing: border-box;
    background-color: var(--bg-page);
    background-image:
      radial-gradient(var(--dot-color) 1px, transparent 1px),
      radial-gradient(ellipse 80% 55% at 50% -5%, var(--bg-glow) 0%, transparent 70%);
    background-size: 24px 24px, 100% 100%;
    color: var(--text-main);
    transition: background-color var(--duration-base) ease, color var(--duration-base) ease;
  }

  /* ===== Fake success card (context stand-in for #step-3) ===== */
  .container {
    max-width: 720px;
    margin: 28vh auto 0;
    background: var(--bg-card);
    padding: var(--space-8);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: var(--shadow-md);
    text-align: center;
  }
  .container h2 {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-weight: 700;
    font-size: var(--font-2xl);
    margin: 0 0 var(--space-3);
    color: var(--primary);
  }
  body.theme-nes .container h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.65em;
    line-height: 1.6;
  }
  .container p { color: var(--text-muted); margin: 0; }

  /* Title is the animation's destination: hidden during the weave, fades in after. */
  #successTitle { opacity: 0; transition: opacity 500ms ease; }
  #successTitle.show { opacity: 1; }

  /* =====================================================================
     THE FEATURE UNDER DESIGN — weave overlay
     (This block is what would be ported into Index.html.)
     ===================================================================== */
  #weaveOverlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9000; /* below _showFallback 9999 and all toasts */
  }
  #weaveOverlay path.thread {
    stroke: var(--thread);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
  }
  #weaveOverlay line.merged {
    stroke: var(--thread);
    stroke-linecap: round;
    vector-effect: non-scaling-stroke; /* keeps 5px caps while collapsing to a dot */
  }
  #weaveOverlay circle.burst { fill: var(--thread); }

  /* Dot-matrix swell: a brighter, slightly larger copy of the body's dot grid,
     perfectly registered on top of it (same tile size ⇒ same dot centers) and
     driven by opacity. 0.75 opacity ≈ +75% intensity. */
  #weaveDots {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    opacity: 0;
  }
  #weaveOverlay .cap { stroke: var(--thread); }
  #weaveOverlay .cap path,
  #weaveOverlay .cap line,
  #weaveOverlay .cap circle {
    stroke: var(--thread);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
  }
  #weaveOverlay .cap .cap-fill { fill: var(--thread); stroke: none; }
  body.theme-nes #weaveOverlay path.thread,
  body.theme-nes #weaveOverlay line.merged,
  body.theme-nes #weaveOverlay .cap path,
  body.theme-nes #weaveOverlay .cap line { stroke-linecap: square; }

  /* ===== Mockup control panel (not part of the feature) ===== */
  #panel {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 12000;
    width: 300px;
    background: var(--bg-card);
    color: var(--text-main);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    padding: var(--space-4);
    font-size: var(--font-sm);
  }
  #panel.collapsed .panel-body { display: none; }
  #panel h3 { margin: 0; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  #panel .panel-body { margin-top: var(--space-3); }
  #panel .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #panel .row label { flex: 0 0 108px; color: var(--text-muted); }
  #panel .row input[type=range] { flex: 1; }
  #panel .row .val { flex: 0 0 44px; text-align: right; font-variant-numeric: tabular-nums; }
  #panel .themes, #panel .actions, #panel .caps { display: flex; gap: 6px; margin-bottom: 10px; }
  #panel button {
    flex: 1; padding: 7px 4px; border-radius: var(--radius-md);
    border: 1px solid var(--border); background: transparent; color: var(--text-main);
    font: inherit; cursor: pointer; min-height: 32px;
  }
  #panel .caps button { font-size: 11px; padding: 6px 2px; }
  #panel button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  body.theme-torres #panel button.primary { color: #0b2030; }
  #panel button[aria-pressed="true"] { background: var(--primary); color: #fff; border-color: var(--primary); }
  body.theme-torres #panel button[aria-pressed="true"] { color: #0b2030; }
  #panel .toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-bottom: 8px; }
  #panel .toggles label { display: flex; gap: 6px; align-items: center; color: var(--text-muted); cursor: pointer; }
  #panel .caps-label { color: var(--text-muted); font-size: 11px; margin: 0 0 4px; }
  #panel .note { color: var(--text-muted); font-size: 11px; margin: 6px 0 0; }

  /* Mockup-only: grid alignment debug overlay */
  #gridDebug { position: fixed; inset: 0; pointer-events: none; z-index: 8999; display: none;
    background-image: radial-gradient(rgba(255,80,80,0.5) 1.5px, transparent 1.5px);
    background-size: 24px 24px; }
  body.debug-grid #gridDebug { display: block; }
</style>
</head>
<body>

  <div class="container">
    <h2 id="successTitle">Success!</h2>
    <p>Your connection has been created. Emails will be woven into your sheet every 15 minutes.</p>
  </div>

  <div id="gridDebug"></div>

  <div id="panel">
    <h3 onclick="document.getElementById('panel').classList.toggle('collapsed')">
      Loom C — weave controls <span>▾</span>
    </h3>
    <div class="panel-body">
      <div class="themes">
        <button data-theme="" aria-pressed="true">Solar</button>
        <button data-theme="theme-torres">Torres</button>
        <button data-theme="theme-nes">C64</button>
      </div>
      <div class="actions">
        <button class="primary" id="replayBtn">▶ Replay</button>
        <button id="slowBtn" aria-pressed="false">🐢 4× slow</button>
      </div>
      <p class="caps-label">End cap</p>
      <div class="caps">
        <button data-cap="knot">Knot</button>
        <button data-cap="swatch">Swatch</button>
        <button data-cap="shuttle">Shuttle</button>
        <button data-cap="spool">Spool</button>
        <button data-cap="none" aria-pressed="true">None</button>
      </div>
      <div class="row"><label for="cAmp">Amplitude</label><input type="range" id="cAmp" min="4" max="16" step="1" value="10"><span class="val" id="vAmp"></span></div>
      <div class="row"><label for="cWave">Wavelength</label><input type="range" id="cWave" min="24" max="144" step="24" value="120"><span class="val" id="vWave"></span></div>
      <div class="row"><label for="cSpan">Travel width</label><input type="range" id="cSpan" min="15" max="90" step="5" value="25"><span class="val" id="vSpan"></span></div>
      <div class="row"><label for="cDur">Draw time</label><input type="range" id="cDur" min="400" max="2500" step="100" value="1000"><span class="val" id="vDur"></span></div>
      <div class="row"><label for="cBulge">Bulge amount</label><input type="range" id="cBulge" min="100" max="260" step="10" value="150"><span class="val" id="vBulge"></span></div>
      <div class="row"><label for="cBulgeMs">Bulge time</label><input type="range" id="cBulgeMs" min="100" max="1200" step="50" value="350"><span class="val" id="vBulgeMs"></span></div>
      <div class="row"><label for="cSnapMs">Snap time</label><input type="range" id="cSnapMs" min="100" max="600" step="20" value="260"><span class="val" id="vSnapMs"></span></div>
      <div class="row"><label for="cMerged">Merged width</label><input type="range" id="cMerged" min="2" max="7" step="0.5" value="5"><span class="val" id="vMerged"></span></div>
      <div class="row"><label for="cHold">Hold time</label><input type="range" id="cHold" min="0" max="4000" step="250" value="0"><span class="val" id="vHold"></span></div>
      <div class="toggles">
        <label><input type="checkbox" id="cGrid"> Show grid</label>
        <label><input type="checkbox" id="cLoop"> Auto-loop</label>
      </div>
      <p class="note">Final design (2026-07-02). Anchored to the “Success!” title. Hold is 0ms in Solar/Torres; C64 overrides to 750ms so the race car has its stage.</p>
    </div>
  </div>

<script>
(function () {
  'use strict';

  /* ---------- mockup state (in the real app these become the spec's fixed values) ---------- */
  var P = {
    amplitude: 10,      // px — vertical reach of each sine around the baseline
    wavelength: 120,    // px
    spanPct: 25,        // % of viewport width traveled
    drawMs: 1000,       // both threads draw simultaneously
    bulgeScale: 1.5,    // amplitude multiplier at peak tension
    bulgeMs: 350,       // time to swell
    snapMs: 260,        // time to collapse flat
    mergedWidth: 5,     // px — stroke width of the final solid line
    holdMs: 0,          // Solar/Torres go straight to the burst; C64 overrides to 750
    cap: 'none',        // knot | swatch | shuttle | spool | none
    slow: 1,
    loop: false
  };
  var PITCH = 24, DOT_OFF = 12; // body dot grid: centers at (12+24i, 12+24j)

  function snapToDot(v) { return DOT_OFF + Math.round((v - DOT_OFF) / PITCH) * PITCH; }

  var currentOverlay = null, currentCar = null, currentGlow = null, timers = [];
  var title = document.getElementById('successTitle');

  function clearRun() {
    timers.forEach(clearTimeout); timers = [];
    if (currentOverlay && currentOverlay.parentNode) currentOverlay.parentNode.removeChild(currentOverlay);
    if (currentCar && currentCar.parentNode) currentCar.parentNode.removeChild(currentCar);
    if (currentGlow && currentGlow.parentNode) currentGlow.parentNode.removeChild(currentGlow);
    currentOverlay = null; currentCar = null; currentGlow = null;
  }

  /* ---------- end caps: weave/loom-themed terminations at the line end ---------- */
  /* Each returns a <g class="cap"> centered on the line end (x, y), initially hidden. */
  function makeCap(type, svgNS, x, y) {
    if (type === 'none') return null;
    var g = document.createElementNS(svgNS, 'g');
    g.setAttribute('class', 'cap');
    function el(name, attrs) {
      var e = document.createElementNS(svgNS, name);
      for (var k in attrs) e.setAttribute(k, attrs[k]);
      g.appendChild(e);
      return e;
    }

    if (type === 'knot') {
      // A simple overhand knot: the strand loops once and exits as a short tail.
      el('circle', { cx: x + 7, cy: y, r: 6 });
      // tail continues through the loop and out
      el('path', { d: 'M' + x + ' ' + y +
                      ' C' + (x + 4) + ' ' + (y + 8) + ' ' + (x + 12) + ' ' + (y + 8) + ' ' + (x + 16) + ' ' + (y + 3) });
    }

    if (type === 'swatch') {
      // A mini woven patch: the strand splits into wefts and is crossed by warps —
      // the "cell fills with fabric" reading. One grid cell wide (24px).
      var x0 = x + 4;
      // three horizontal wefts (middle one continues the merged strand)
      el('line', { x1: x0, y1: y - 7, x2: x0 + 22, y2: y - 7 });
      el('line', { x1: x0, y1: y,     x2: x0 + 22, y2: y });
      el('line', { x1: x0, y1: y + 7, x2: x0 + 22, y2: y + 7 });
      // three vertical warps, dashed so they read as passing over/under the wefts
      el('line', { x1: x0 + 4,  y1: y - 11, x2: x0 + 4,  y2: y + 11, 'stroke-dasharray': '4.5 3', 'stroke-dashoffset': '0' });
      el('line', { x1: x0 + 11, y1: y - 11, x2: x0 + 11, y2: y + 11, 'stroke-dasharray': '4.5 3', 'stroke-dashoffset': '3.7' });
      el('line', { x1: x0 + 18, y1: y - 11, x2: x0 + 18, y2: y + 11, 'stroke-dasharray': '4.5 3', 'stroke-dashoffset': '0' });
    }

    if (type === 'shuttle') {
      // A loom shuttle: pointed oval with the thread eye at its center.
      var L = 34, H = 9, cx = x + L / 2 + 2;
      el('path', { d: 'M' + (x + 2) + ' ' + y +
                      ' Q' + cx + ' ' + (y - H) + ' ' + (x + L + 2) + ' ' + y +
                      ' Q' + cx + ' ' + (y + H) + ' ' + (x + 2) + ' ' + y + ' Z' });
      el('circle', { cx: cx, cy: y, r: 2, 'class': 'cap-fill' });
    }

    if (type === 'spool') {
      // A spool of thread: two flanges with the strand wound between them.
      var sx = x + 4, w = 16, fh = 9; // winding width, flange half-height
      el('line', { x1: sx, y1: y - fh, x2: sx, y2: y + fh, 'stroke-width': 3 });
      el('line', { x1: sx + w, y1: y - fh, x2: sx + w, y2: y + fh, 'stroke-width': 3 });
      // windings
      el('line', { x1: sx + 2, y1: y - 4, x2: sx + w - 2, y2: y - 4 });
      el('line', { x1: sx + 2, y1: y,     x2: sx + w - 2, y2: y });
      el('line', { x1: sx + 2, y1: y + 4, x2: sx + w - 2, y2: y + 4 });
    }

    // hidden until the snap; pops in with a small overshoot
    g.style.opacity = '0';
    g.style.transformOrigin = x + 'px ' + y + 'px';
    g.style.transform = 'scale(0.6)';
    return g;
  }

  /* ---------- the animation (portable core) ---------- */
  function runWeave() {
    try {
      // Spec: with reduced-motion, do not create the node at all (title still shows).
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        console.log('[weave] prefers-reduced-motion: skipped');
        title.classList.add('show');
        return;
      }
      clearRun();
      title.classList.remove('show'); // the weave happens where the title will appear

      var vw = window.innerWidth, vh = window.innerHeight;
      var slow = P.slow;

      // Geometry — centered precisely on the "Success!" title (grid-snapping the
      // endpoints shifted the whole line off-center by up to half a pitch)
      var tr = title.getBoundingClientRect();
      var cx = tr.left + tr.width / 2;
      var y0 = tr.top + tr.height / 2;
      var spanPx = vw * (P.spanPct / 100);
      var x0 = cx - spanPx / 2;
      var x1 = cx + spanPx / 2;
      var A = P.amplitude, W = P.wavelength;

      var svgNS = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(svgNS, 'svg');
      svg.id = 'weaveOverlay';
      svg.setAttribute('viewBox', '0 0 ' + vw + ' ' + vh);
      svg.setAttribute('width', vw); svg.setAttribute('height', vh);
      svg.setAttribute('aria-hidden', 'true');

      // Group holding both waves — scaled vertically about the baseline for the
      // bulge/snap. vector-effect keeps strokes at 2px while scaling.
      var waves = document.createElementNS(svgNS, 'g');
      waves.style.transformOrigin = '0px ' + y0 + 'px';
      svg.appendChild(waves);

      // Wave geometry: peaks/troughs land exactly on dot columns (cos phase from
      // first dot). Thread A arcs up first; thread B is its mirror — where A is
      // over, B is under, so together they read as a two-strand braid.
      function waveD(sign, fromRight) {
        var d = '', step = 2;
        if (!fromRight) {
          for (var x = x0; x <= x1; x += step) {
            var y = y0 - sign * A * Math.cos((x - x0) / W * 2 * Math.PI);
            d += (x === x0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
          }
        } else {
          for (var x2 = x1; x2 >= x0; x2 -= step) {
            var y2 = y0 - sign * A * Math.cos((x2 - x0) / W * 2 * Math.PI);
            d += (x2 === x1 ? 'M' : 'L') + x2.toFixed(1) + ' ' + y2.toFixed(1);
          }
        }
        return d;
      }
      var pathA = document.createElementNS(svgNS, 'path');   // draws left → right
      pathA.setAttribute('class', 'thread');
      pathA.setAttribute('d', waveD(+1, false));
      var pathB = document.createElementNS(svgNS, 'path');   // mirror, draws right → left
      pathB.setAttribute('class', 'thread');
      pathB.setAttribute('d', waveD(-1, true));
      waves.appendChild(pathA);
      waves.appendChild(pathB);

      // The merged strand: straight, thicker, hidden until the snap.
      var merged = document.createElementNS(svgNS, 'line');
      merged.setAttribute('class', 'merged');
      merged.setAttribute('x1', x0); merged.setAttribute('y1', y0);
      merged.setAttribute('x2', x1); merged.setAttribute('y2', y0);
      merged.setAttribute('stroke-width', 2); // starts at thread weight, plumps after the snap
      merged.style.opacity = '0';
      svg.appendChild(merged);

      // End cap: weave/loom-themed termination at the merged strand's end.
      var cap = makeCap(P.cap, svgNS, x1, y0);
      if (cap) svg.appendChild(cap);

      document.body.appendChild(svg);
      currentOverlay = svg;

      // Dot-matrix swell: the loom's grid brightens +75% while the threads draw
      var dots = document.createElement('div');
      dots.id = 'weaveDots';
      document.body.appendChild(dots);
      currentGlow = dots;
      dots.getBoundingClientRect(); // flush
      dots.style.transition = 'opacity ' + (P.drawMs * slow) + 'ms ease';
      dots.style.opacity = '0.75';

      /* ---- Phase 1: both threads draw on simultaneously, opposite directions ---- */
      [pathA, pathB].forEach(function (p) {
        var len = p.getTotalLength();
        p.style.strokeDasharray = len;
        p.style.strokeDashoffset = len;
      });
      svg.getBoundingClientRect(); // flush
      [pathA, pathB].forEach(function (p) {
        p.style.transition = 'stroke-dashoffset ' + (P.drawMs * slow) + 'ms ease';
        p.style.strokeDashoffset = '0';
      });

      var tDraw = P.drawMs * slow;
      var tBulge = P.bulgeMs * slow;
      var tSnap = P.snapMs * slow;

      /* ---- Phase 2: bulge — both waves swell under tension ---- */
      timers.push(setTimeout(function () {
        waves.style.transition = 'transform ' + tBulge + 'ms cubic-bezier(0.34, 1.2, 0.64, 1)';
        waves.style.transform = 'scale(1, ' + P.bulgeScale + ')';
      }, tDraw));

      /* ---- Phase 3: snap — waves collapse fully flat, then swap to the merged
             strand in a single frame. At scale ~0 the two 2px threads ARE a 2px
             line on the baseline, so the swap is pixel-identical — nothing is
             ever visible at two different heights at once. ---- */
      timers.push(setTimeout(function () {
        waves.style.transition = 'transform ' + tSnap + 'ms cubic-bezier(0.8, 0, 1, 1)';
        waves.style.transform = 'scale(1, 0.01)';
      }, tDraw + tBulge));
      timers.push(setTimeout(function () {
        waves.style.opacity = '0';                        // instant, invisible swap
        merged.style.opacity = '1';
        merged.getBoundingClientRect(); // flush
        // then the strand plumps to its final width — the "thunk" of merging
        merged.style.transition = 'stroke-width ' + (200 * slow) + 'ms cubic-bezier(0.34, 1.3, 0.64, 1)';
        merged.setAttribute('stroke-width', P.mergedWidth);
        if (cap) {
          cap.style.transition = 'opacity ' + (180 * slow) + 'ms ease, transform ' + (260 * slow) + 'ms cubic-bezier(0.34, 1.4, 0.64, 1)';
          cap.style.opacity = '1';
          cap.style.transform = 'scale(1)';
        }
      }, tDraw + tBulge + tSnap));

      /* ---- Phase 4: two endings — the title takes the thread's place ---- */
      var tEnd = tDraw + tBulge + tSnap + 200 * slow;     // includes the plump-up settle
      var fadeMs = 180 * slow;
      var isNes = document.body.classList.contains('theme-nes');
      var holdMs = (isNes ? 750 : P.holdMs) * slow;       // C64 holds 750ms — the car needs a stage
      var tDone; // when everything visual is finished

      if (isNes) {
        // C64: the race car erases the strand — it disappears right → left,
        // trailing ~100px behind the car. Car fades over its second half and is
        // fully transparent as it reaches the left end, just before the title.
        var carT = holdMs + fadeMs;
        var lagMs = carT * Math.min(1, 100 / (x1 - x0)); // 100px wake, clamped on narrow viewports
        var car = document.createElement('div');
        car.textContent = '🏎️';
        car.setAttribute('aria-hidden', 'true');
        car.style.cssText = 'position:fixed;left:0;top:0;pointer-events:none;z-index:9000;font-size:22px;line-height:1;will-change:transform,opacity;';
        var carY = y0 - 23;                               // wheels on the strand
        var lineLen = merged.getTotalLength();
        timers.push(setTimeout(function () {
          car.style.transform = 'translate(' + (x1 - 11) + 'px,' + carY + 'px)';
          document.body.appendChild(car);
          currentCar = car;
          car.getBoundingClientRect(); // flush
          car.style.transition = 'transform ' + carT + 'ms linear, opacity ' + (carT / 2) + 'ms linear';
          car.style.transform = 'translate(' + (x0 - 26) + 'px,' + carY + 'px)';
          timers.push(setTimeout(function () { car.style.opacity = '0'; }, carT / 2));
          // the strand vanishes in the car's wake (dash shrinks from the right end)
          merged.style.strokeDasharray = lineLen + ' ' + lineLen;
          merged.getBoundingClientRect(); // flush
          merged.style.transition = 'stroke-dasharray ' + carT + 'ms linear ' + lagMs + 'ms';
          merged.style.strokeDasharray = '0 ' + lineLen;
          // loom cools back down alongside
          dots.style.transition = 'opacity ' + carT + 'ms ease';
          dots.style.opacity = '0';
          timers.push(setTimeout(function () {
            if (car.parentNode) car.parentNode.removeChild(car);
            if (currentCar === car) currentCar = null;
          }, carT + lagMs + 100));
        }, tEnd));
        tDone = tEnd + carT + lagMs + 150;
      } else {
        // Solar/Torres: the strand retreats from both ends into a single dot,
        // which scatters into small sparks spreading (mostly) horizontally
        // across the width where "Success!" appears — the words fade in beneath.
        var tCollapse = 450 * slow, tBurst = 340 * slow;
        var SPARKS = 9;
        var sparks = [];
        for (var s = 0; s < SPARKS; s++) {
          var sp = document.createElementNS(svgNS, 'circle');
          sp.setAttribute('class', 'burst');
          sp.setAttribute('cx', cx); sp.setAttribute('cy', y0);
          sp.setAttribute('r', s % 2 ? 2 : 2.8);
          sp.style.opacity = '0';
          svg.appendChild(sp);
          sparks.push(sp);
        }

        timers.push(setTimeout(function () {
          merged.style.transformOrigin = cx + 'px ' + y0 + 'px';
          merged.style.transition = 'transform ' + tCollapse + 'ms cubic-bezier(0.55, 0, 0.85, 0.4)';
          merged.style.transform = 'scale(0.004, 1)';     // round caps keep it a 5px dot
          dots.style.transition = 'opacity ' + (tCollapse + tBurst) + 'ms ease';
          dots.style.opacity = '0';
        }, tEnd + holdMs));
        timers.push(setTimeout(function () {
          merged.style.opacity = '0';
          var spread = Math.max(tr.width, 120);           // the title's actual width
          sparks.forEach(function (sp2, i) {
            var f = i / (SPARKS - 1) - 0.5;               // -0.5 … 0.5 across the spread
            var dx = f * spread * (0.85 + Math.random() * 0.3);
            var dy = (Math.random() - 0.5) * 14;          // slight vertical scatter
            sp2.style.opacity = '1';
            sp2.getBoundingClientRect(); // flush
            sp2.style.transition = 'transform ' + tBurst + 'ms cubic-bezier(0.2, 0.6, 0.4, 1), opacity ' + tBurst + 'ms ease-out';
            sp2.style.transform = 'translate(' + dx.toFixed(1) + 'px, ' + dy.toFixed(1) + 'px)';
            sp2.style.opacity = '0';
          });
          title.classList.add('show');                    // the burst hands off to the words
        }, tEnd + holdMs + tCollapse));
        tDone = tEnd + holdMs + tCollapse + tBurst + 80;
      }

      timers.push(setTimeout(function () {
        if (svg.parentNode) svg.parentNode.removeChild(svg);
        if (dots.parentNode) dots.parentNode.removeChild(dots);
        if (currentOverlay === svg) currentOverlay = null;
        if (currentGlow === dots) currentGlow = null;
        title.classList.add('show'); // already shown in the burst path; ensures NES shows it
      }, tDone));
      timers.push(setTimeout(function () {
        if (P.loop) runWeave();
      }, tDone + 1400));
      // (real implementation also wires transitionend + a 5s fallback timer)
    } catch (e) {
      console.error('[weave] failed, wizard unaffected:', e);
      clearRun();
      title.classList.add('show');
    }
  }

  /* ---------- panel wiring ---------- */
  function bind(id, valId, key, fmt, scale) {
    var el = document.getElementById(id), out = document.getElementById(valId);
    function upd() { P[key] = +el.value * (scale || 1); out.textContent = fmt(el.value); }
    el.addEventListener('input', function () { upd(); runWeave(); });
    upd();
  }
  bind('cAmp', 'vAmp', 'amplitude', function (v) { return v + 'px'; });
  bind('cWave', 'vWave', 'wavelength', function (v) { return v + 'px'; });
  bind('cSpan', 'vSpan', 'spanPct', function (v) { return v + '%'; });
  bind('cDur', 'vDur', 'drawMs', function (v) { return v + 'ms'; });
  bind('cBulge', 'vBulge', 'bulgeScale', function (v) { return (v / 100).toFixed(1) + '×'; }, 0.01);
  bind('cBulgeMs', 'vBulgeMs', 'bulgeMs', function (v) { return v + 'ms'; });
  bind('cSnapMs', 'vSnapMs', 'snapMs', function (v) { return v + 'ms'; });
  bind('cMerged', 'vMerged', 'mergedWidth', function (v) { return v + 'px'; });
  bind('cHold', 'vHold', 'holdMs', function (v) { return v + 'ms'; });

  document.getElementById('cGrid').addEventListener('change', function () { document.body.classList.toggle('debug-grid', this.checked); });
  document.getElementById('cLoop').addEventListener('change', function () { P.loop = this.checked; if (P.loop) runWeave(); });

  document.getElementById('replayBtn').addEventListener('click', runWeave);
  document.getElementById('slowBtn').addEventListener('click', function () {
    P.slow = P.slow === 1 ? 4 : 1;
    this.setAttribute('aria-pressed', P.slow === 4 ? 'true' : 'false');
    runWeave();
  });

  document.querySelectorAll('#panel .caps button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      P.cap = btn.dataset.cap;
      document.querySelectorAll('#panel .caps button').forEach(function (b) { b.setAttribute('aria-pressed', 'false'); });
      btn.setAttribute('aria-pressed', 'true');
      runWeave();
    });
  });

  document.querySelectorAll('#panel .themes button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.body.className = btn.dataset.theme + (document.getElementById('cGrid').checked ? ' debug-grid' : '');
      document.querySelectorAll('#panel .themes button').forEach(function (b) { b.setAttribute('aria-pressed', 'false'); });
      btn.setAttribute('aria-pressed', 'true');
      runWeave();
    });
  });

  window.addEventListener('resize', function () { if (currentOverlay) runWeave(); });

  // First run
  setTimeout(runWeave, 400);
})();
</script>
</body>
